worker_processes 1;
events { worker_connections 1024; }
http {
include /Users/acidlake/Development/UPPER/Forge/repos/forge-v3/.forge/dev/mime.types;
client_max_body_size 100M;

log_format json_combined escape=json
'{' 
'"time":"$time_iso8601",' 
'"remote_addr":"$remote_addr",' 
'"method":"$request_method",' 
'"uri":"$request_uri",' 
'"status":$status,' 
'"body_bytes":$body_bytes_sent,' 
'"request_time":$request_time,' 
'"referer":"$http_referer",' 
'"user_agent":"$http_user_agent"' 
'}';

access_log /dev/stdout json_combined;
error_log stderr;

server {
listen 80;
server_name forge-v3.test;
root /Users/acidlake/Development/UPPER/Forge/repos/forge-v3/public;
index index.php index.html;

# Allow framing for live preview
add_header X-Frame-Options "SAMEORIGIN" always;
proxy_hide_header X-Frame-Options;
fastcgi_hide_header X-Frame-Options;

location / {
try_files $uri $uri/ /index.php?$query_string;
}
    location ~ \.php$ {
fastcgi_pass unix:/tmp/fpm_b4b41168.sock;
fastcgi_index index.php;
include /Users/acidlake/Development/UPPER/Forge/repos/forge-v3/.forge/dev/fastcgi_params;
fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
fastcgi_hide_header X-Frame-Options;
}
  }
server {
listen 443 ssl;
server_name forge-v3.test;
client_max_body_size 100M;
ssl_certificate /Users/acidlake/Development/UPPER/Forge/repos/forge-v3/.forge/dev/certs/forge-v3.test.pem;
ssl_certificate_key /Users/acidlake/Development/UPPER/Forge/repos/forge-v3/.forge/dev/certs/forge-v3.test-key.pem;
root /Users/acidlake/Development/UPPER/Forge/repos/forge-v3/public;
index index.php index.html;
location / {
try_files $uri $uri/ /index.php?$query_string;
}
    location ~ \.php$ {
fastcgi_pass unix:/tmp/fpm_b4b41168.sock;
fastcgi_index index.php;
include /Users/acidlake/Development/UPPER/Forge/repos/forge-v3/.forge/dev/fastcgi_params;
fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
fastcgi_hide_header X-Frame-Options;
}
  }
}
